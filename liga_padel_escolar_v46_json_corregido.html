<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Liga de Pádel Escolar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#0b1020;
    --bg2:#131a2e;
    --panel:#18213a;
    --panel2:#202b49;
    --line:rgba(255,255,255,.09);
    --line2:rgba(255,255,255,.16);
    --txt:#edf2ff;
    --muted:#9aa7c4;
    --gold:#ffbf3c;
    --green:#43d18d;
    --red:#ff6b7a;
    --blue:#64a7ff;
    --violet:#b48cff;
    --cyan:#45d6d9;
    --radius:16px;
    --shadow:0 12px 32px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box}
  body{margin:0;background:
      radial-gradient(circle at top left, rgba(100,167,255,.12), transparent 22%),
      radial-gradient(circle at top right, rgba(180,140,255,.09), transparent 20%),
      linear-gradient(180deg,#09101d,#0d1424 40%,#0b1020);
      color:var(--txt);font-family:Inter,system-ui,sans-serif;min-height:100vh}
  .app{max-width:1240px;margin:0 auto;padding:18px}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(11,16,32,.88);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:14px 18px;margin:0 -18px 18px}
  .topbar-row{max-width:1240px;margin:0 auto;display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .logo-box{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#25345d,#12192e);border:1px solid var(--line2);display:grid;place-items:center;overflow:hidden;box-shadow:var(--shadow)}
  .logo-box img{width:100%;height:100%;object-fit:cover}
  .logo-fallback{font-size:24px}
  .brand h1{font-size:23px;line-height:1.1;margin:0;font-weight:800;letter-spacing:-.02em}
  .brand p{margin:4px 0 0;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.16em}
  .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .bottom-admin-wrap{max-width:1240px;margin:22px auto 0;padding-top:10px;border-top:1px solid var(--line);display:flex;justify-content:center}
  .bottom-admin-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
  .spectator-note{font-size:12px;color:var(--muted);text-align:center;margin-top:8px}

  .admin-chip{display:none;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:700;background:rgba(67,209,141,.12);color:var(--green);border:1px solid rgba(67,209,141,.28)}
  .admin-chip.show{display:inline-flex}
  .btn,.tab-btn,.seg-btn{border:1px solid var(--line2);background:var(--panel);color:var(--txt);padding:10px 14px;border-radius:12px;cursor:pointer;font:600 14px Inter,sans-serif;transition:.18s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn:hover,.tab-btn:hover,.seg-btn:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.28)}
  .btn.primary{background:linear-gradient(135deg,rgba(100,167,255,.22),rgba(100,167,255,.12));color:#cfe1ff;border-color:rgba(100,167,255,.35)}
  .btn.warn{background:linear-gradient(135deg,rgba(255,191,60,.16),rgba(255,191,60,.08));color:#ffd56d;border-color:rgba(255,191,60,.33)}
  .btn.good{background:linear-gradient(135deg,rgba(67,209,141,.16),rgba(67,209,141,.08));color:#7deab0;border-color:rgba(67,209,141,.35)}
  .btn.bad{background:linear-gradient(135deg,rgba(255,107,122,.16),rgba(255,107,122,.08));color:#ff96a0;border-color:rgba(255,107,122,.32)}
  .btn.small{padding:7px 10px;border-radius:10px;font-size:12px}
  .nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab-btn.active{background:linear-gradient(135deg,rgba(255,191,60,.16),rgba(255,191,60,.08));color:#ffd56d;border-color:rgba(255,191,60,.35)}
  .tab-btn.news-tab.has-news{
    position:relative;
    border-color:rgba(69,214,217,.38);
    color:#bff7f8;
    background:linear-gradient(135deg,rgba(69,214,217,.14),rgba(180,140,255,.10));
    box-shadow:0 0 0 1px rgba(69,214,217,.08) inset, 0 10px 24px rgba(69,214,217,.08);
    animation:newsTabPulse 2.4s ease-in-out infinite;
  }
  .tab-btn.news-tab.has-news:hover{border-color:rgba(69,214,217,.62)}
  .tab-btn.news-tab.has-news.active{
    background:linear-gradient(135deg,rgba(69,214,217,.24),rgba(180,140,255,.16));
    color:#efffff;
    border-color:rgba(69,214,217,.68);
    box-shadow:0 0 0 1px rgba(69,214,217,.18) inset, 0 12px 28px rgba(69,214,217,.14);
  }
  .tab-btn.news-tab.has-news::before{
    content:'•';
    font-size:16px;
    line-height:1;
    color:#7df0f2;
    text-shadow:0 0 10px rgba(69,214,217,.55);
    animation:newsDotFloat 1.8s ease-in-out infinite;
  }
  @keyframes newsTabPulse{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-1px)}
  }
  @keyframes newsDotFloat{
    0%,100%{transform:translateY(0);opacity:1}
    50%{transform:translateY(-1px);opacity:.75}
  }
  .grid{display:grid;gap:16px}
  .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
  .card{background:linear-gradient(180deg,rgba(24,33,58,.98),rgba(19,26,46,.98));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
  .card h3,.card h2{margin:0 0 12px}
  .card-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .muted{color:var(--muted)}
  .pair-stack{display:flex;flex-direction:column;gap:2px}
  .pair-line{font-size:14px;line-height:1.4;font-weight:500;color:var(--txt)}
  .pair-meta{font-size:12px;line-height:1.3;color:var(--muted)}
  .pill-row{display:flex;flex-wrap:wrap;gap:10px}
  .league-pill{padding:10px 16px;border-radius:999px;border:1px solid var(--line2);background:var(--panel);cursor:pointer;font-weight:700}
  .league-pill.active{color:#fff}
  .future.active{background:rgba(255,191,60,.16);border-color:rgba(255,191,60,.35);color:#ffd56d}
  .pro.active{background:rgba(100,167,255,.16);border-color:rgba(100,167,255,.35);color:#c9ddff}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px}
  .stat{background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:14px;padding:14px}
  .stat small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;font-size:11px}
  .stat strong{font-size:28px;font-family:"JetBrains Mono",monospace}
  table{width:100%;border-collapse:collapse}
  th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
  tr:last-child td{border-bottom:none}
  .table-wrap{overflow:auto}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid var(--line2);font-size:12px;font-weight:700}
  .badge.ok{color:#83eab5;background:rgba(67,209,141,.12);border-color:rgba(67,209,141,.28)}
  .badge.no{color:#ff98a5;background:rgba(255,107,122,.12);border-color:rgba(255,107,122,.24)}
  .badge.gold{color:#ffd56d;background:rgba(255,191,60,.12);border-color:rgba(255,191,60,.28)}
  .badge.blue{color:#d3e4ff;background:rgba(100,167,255,.12);border-color:rgba(100,167,255,.28)}
  .badge.violet{color:#d9c7ff;background:rgba(180,140,255,.12);border-color:rgba(180,140,255,.28)}
  .form-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:12px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line2);background:#0f1730;color:var(--txt);border-radius:12px;padding:11px 12px;font:500 14px Inter,sans-serif}
  .field textarea{min-height:88px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:rgba(100,167,255,.42);box-shadow:0 0 0 4px rgba(100,167,255,.12)}
  .c1{grid-column:span 1}.c2{grid-column:span 2}.c3{grid-column:span 3}.c4{grid-column:span 4}
  .c5{grid-column:span 5}.c6{grid-column:span 6}.c7{grid-column:span 7}.c8{grid-column:span 8}
  .c9{grid-column:span 9}.c10{grid-column:span 10}.c12{grid-column:span 12}
  .subtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .seg-btn.active{background:rgba(255,255,255,.08)}
  .empty{padding:30px 16px;text-align:center;color:var(--muted)}
  .days{display:flex;gap:8px;flex-wrap:wrap}
  .day-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border:1px solid var(--line2);background:#101834;border-radius:999px}
  .day-chip input{accent-color:var(--blue)}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(80px);opacity:0;transition:.25s;background:#101833;border:1px solid var(--line2);border-radius:999px;padding:11px 16px;z-index:30;font-weight:700;box-shadow:var(--shadow)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast.ok{color:#83eab5}.toast.err{color:#ff97a5}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:18px;z-index:40}
  .overlay.open{display:flex}
  .modal{width:min(920px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,#19233e,#121a2f);border:1px solid var(--line2);border-radius:20px;padding:18px;box-shadow:var(--shadow)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  .close-btn{background:none;border:none;color:var(--muted);font-size:28px;cursor:pointer}
  .close-btn:hover{color:var(--txt)}
  .match-item{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding:12px 0;border-bottom:1px solid var(--line)}
  .match-item:last-child{border-bottom:none}
  .match-pair-block{flex:1 1 240px;min-width:min(100%,240px)}
  .match-vs{display:inline-flex;align-items:center;justify-content:center;min-width:52px;padding:7px 10px;border-radius:999px;background:rgba(100,167,255,.12);border:1px solid rgba(100,167,255,.24);color:#d3e4ff;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
  .pair-name,.pair-sub{font-size:clamp(14px,1.15rem,16px);line-height:1.45;font-weight:500;color:var(--txt);overflow-wrap:anywhere;word-break:break-word}
  .pair-sub{opacity:.94}
  .score{font-family:"JetBrains Mono",monospace;font-size:18px;font-weight:700;min-width:54px;text-align:center}
  .match-admin-row{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap;padding:12px 0;border-bottom:1px solid var(--line)}
  .match-admin-row:last-child{border-bottom:none}
  .match-admin-main{display:flex;align-items:flex-start;gap:12px;flex:1 1 320px;min-width:260px}
  .match-admin-teams{display:flex;flex-direction:column;gap:8px;min-width:0}
  .match-team-line{font-size:clamp(14px,1.05rem,16px);line-height:1.45;font-weight:500;color:var(--txt);overflow-wrap:anywhere;word-break:break-word}
  .match-admin-side{display:flex;flex-direction:column;align-items:flex-end;gap:8px;min-width:190px}
  .match-result-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .match-admin-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  @media (max-width: 720px){
    .match-admin-row{gap:12px}
    .match-admin-side{align-items:flex-start;min-width:100%;padding-left:44px}
    .match-result-actions{align-items:flex-start}
    .match-admin-actions{justify-content:flex-start}
  }
  .admin-only{display:none}
  .admin-only.show{display:block}
  .small-note{font-size:12px;color:var(--muted)}
  .match-note{width:100%;margin-top:8px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--line);font-size:13px;line-height:1.45;color:var(--txt)}
  .match-note strong{color:#ffd56d}
  .match-note.muted-note strong{color:#d3e4ff}
  .resource-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .week-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .group-card{background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:14px;padding:14px}

  .pos-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:34px;padding:0 10px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line2);font-weight:800}
  .pos-badge.top1{background:rgba(255,191,60,.18);border-color:rgba(255,191,60,.38);color:#ffd56d}
  .pos-badge.top2{background:rgba(194,201,214,.16);border-color:rgba(194,201,214,.34);color:#e7edf7}
  .pos-badge.top3{background:rgba(205,127,50,.18);border-color:rgba(205,127,50,.34);color:#e5b28a}
  .col-dif,.col-pts{font-weight:800;text-align:center}
  .col-dif{background:rgba(255,255,255,.03)}
  .col-pts{background:rgba(255,191,60,.14);color:#ffd56d}
  th.col-dif,th.col-pts{position:relative}

  .group-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .chip-list{display:flex;gap:8px;flex-wrap:wrap}
  .pair-chip{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;background:#101834;border:1px solid var(--line2);border-radius:999px;font-size:12px}
  .pair-chip button{all:unset;cursor:pointer;color:#ff97a5;font-weight:700}
  .hero{display:grid;grid-template-columns:1.3fr .7fr;gap:16px}
  .hero-box{min-height:100%}
  .callout{background:linear-gradient(135deg,rgba(255,191,60,.12),rgba(100,167,255,.1));border:1px solid rgba(255,255,255,.1);padding:18px;border-radius:18px}
  .mono{font-family:"JetBrains Mono",monospace}
  .hidden{display:none!important}
  @media (max-width:900px){
    .grid-2,.grid-3,.grid-4,.hero{grid-template-columns:1fr}
  }
  .news-hero{display:grid;gap:16px}
  .news-panel{background:linear-gradient(180deg,rgba(24,33,58,.98),rgba(19,26,46,.98));border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow)}
  .news-text{font-size:clamp(20px,3vw,34px);line-height:1.35;font-weight:700;white-space:pre-wrap}
  .news-image-wrap{border-radius:20px;overflow:hidden;border:1px solid var(--line2);background:rgba(255,255,255,.03)}
  .news-image-wrap img{display:block;width:100%;height:auto;max-height:72vh;object-fit:contain;background:#0c1326}
  @media (max-width:720px){
    .c1,.c2,.c3,.c4,.c5,.c6,.c7,.c8,.c9,.c10,.c12{grid-column:span 12}
    .app{padding:12px}
    .topbar{margin:0 -12px 14px;padding:12px}
    .pair-line{font-size:13px}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-row">
    <div class="brand">
      <div class="logo-box" id="brandLogo"><div class="logo-fallback">🎾</div></div>
      <div>
        <h1 id="brandTitle">Liga de Pádel Escolar</h1>
        <p id="brandSeason">Temporada 2025–2026</p>
      </div>
    </div>
    <div class="top-actions"></div>
  </div>
</div>

<div class="app">
  <div class="nav" id="mainTabs"></div>
  <div id="view"></div>
  <div class="bottom-admin-wrap">
    <div>
      <div class="bottom-admin-actions">
        <span class="admin-chip" id="adminChip">✓ Admin activo</span>
        <button class="btn" id="adminToggleBtn">Acceso administrador</button>
      </div>
      <div class="spectator-note" id="spectatorNote"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Modal</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes'];
const COURSES = ['1º ESO','2º ESO','3º ESO','4º ESO','1º Bachillerato','Profesor/a'];
const LEVELS = ['Iniciación','Básico','Medio','Avanzado','Competición'];
const LOCAL_BACKUP_KEY = 'padel_escolar_firebase_backup_v1';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAuW0_EFV_E_GnZjfJ6HYzG2ko50fjzMi8",
  authDomain: "escolapiospadeltour.firebaseapp.com",
  databaseURL: "https://escolapiospadeltour-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "escolapiospadeltour",
  storageBucket: "escolapiospadeltour.firebasestorage.app",
  messagingSenderId: "577721250781",
  appId: "1:577721250781:web:881da445f32121cc617c34",
  measurementId: "G-CDD185L5VS"
};
const FIREBASE_COLLECTION = 'padel_apps';
const FIREBASE_DOCUMENT_ID = 'liga_escolar_principal';
const APP_VERSION = 'v44';
const APP_VERSION_LABEL = 'v44 · Pantalla comercial';

const DEFAULT_STATE = {
  config: {
    title: 'Liga de Pádel Escolar',
    season: '2025–2026',
    adminPassword: 'admin123',
    logo: null,
    newsImage: null,
    normsImage: null,
    newsText: 'Sin novedades'
  },
  ui: {
    tab: 'inicio',
    adminTab: 'config',
    selectedLeagueId: 'future',
    showPostponedList: false,
    calendarSearch: '',
    adminMatchesSearch: '',
    hiddenCalendarWeeks: { future: [], pro: [] }
  },
  resources: [],
  leagues: [
    {
      id: 'future',
      name: 'Liga Future',
      subtitle: '1º y 2º ESO',
      accent: 'future',
      pairs: [],
      groups: [],
      matches: [],
      playoffMatches: []
    },
    {
      id: 'pro',
      name: 'Liga Pro',
      subtitle: '3º y 4º ESO · 1º Bachillerato · Profesores',
      accent: 'pro',
      pairs: [],
      groups: [],
      matches: [],
      playoffMatches: []
    }
  ]
};

let state = loadState();
if(isPublicMode()) state.ui.tab = 'normas';
let isAdmin = false;
let modalCleanup = null;
let firebaseApp = null;
let firestoreDb = null;
let firebaseDocRef = null;
let firebaseUnsubscribe = null;
let firebaseReady = false;
let remoteStateLoaded = false;
let saveTimer = null;
let suppressRemoteEcho = false;

function deepClone(v){ return JSON.parse(JSON.stringify(v)); }
function uid(prefix='id'){ return prefix + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }
function isPublicMode(){
  try{
    const params = new URLSearchParams(window.location.search);
    return ['publico','public','espectador','viewer'].includes((params.get('modo')||params.get('view')||'').toLowerCase());
  }catch(e){ return false; }
}

function firebaseConfigured(){
  return FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey && !String(FIREBASE_CONFIG.apiKey).startsWith('PEGA_AQUI');
}
function persistLocalBackup(){
  try{
    localStorage.setItem(LOCAL_BACKUP_KEY, JSON.stringify(state));
  }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(LOCAL_BACKUP_KEY);
    if(!raw) return deepClone(DEFAULT_STATE);
    const parsed = JSON.parse(raw);
    const merged = deepClone(DEFAULT_STATE);
    merged.config = {...merged.config, ...(parsed.config||{})};
    merged.ui = {...merged.ui, ...(parsed.ui||{})};
    merged.resources = Array.isArray(parsed.resources) ? parsed.resources.map(r => ({
      id: r.id || uid('res'),
      title: String(r.title || ''),
      url: String(r.url || ''),
      description: String(r.description || ''),
      type: String(r.type || 'Enlace')
    })) : [];
    merged.leagues = (parsed.leagues && Array.isArray(parsed.leagues) ? parsed.leagues : merged.leagues).map((lg, idx) => ({
      id: lg.id || merged.leagues[idx]?.id || uid('league'),
      name: lg.name || merged.leagues[idx]?.name || `Liga ${idx+1}`,
      subtitle: lg.subtitle || merged.leagues[idx]?.subtitle || '',
      accent: lg.accent || merged.leagues[idx]?.accent || 'future',
      pairs: Array.isArray(lg.pairs) ? lg.pairs.map(p => ({...p, warnings: Math.max(0, Number(p?.warnings || 0) || 0), warningNote: String(p?.warningNote || '')})) : [],
      groups: Array.isArray(lg.groups) ? lg.groups : [],
      matches: Array.isArray(lg.matches) ? lg.matches : [],
      playoffMatches: Array.isArray(lg.playoffMatches) ? lg.playoffMatches : []
    }));
    return merged;
  }catch(e){
    return deepClone(DEFAULT_STATE);
  }
}
function sanitizeStateForFirestore(source){
  const clean = deepClone(source);
  clean.ui = {
    hiddenCalendarWeeks: deepClone(source?.ui?.hiddenCalendarWeeks || DEFAULT_STATE.ui.hiddenCalendarWeeks)
  };
  return clean;
}
function saveState(options = {}){
  persistLocalBackup();
  updateHeader();
  if(options.skipRemote) return;
  scheduleRemoteSave();
}
function scheduleRemoteSave(){
  if(!firebaseReady || !firebaseDocRef) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      suppressRemoteEcho = true;
      await firebaseDocRef.set({
        state: sanitizeStateForFirestore(state),

   adminKey: "padel2026Admin!", 

        meta: {
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          season: state.config?.season || '',
          title: state.config?.title || ''
        }
      }, {merge:true});
    }catch(err){
      console.error('Error al guardar en Firebase:', err);
      toast('No se han podido sincronizar los cambios con Firebase', 'err');
    }finally{
      setTimeout(()=>{ suppressRemoteEcho = false; }, 1200);
    }
  }, 250);
}
function applyRemoteState(remote){
  const normalized = normalizeImportedState(remote);
  normalized.ui = {...state.ui};
  state = normalized;
  persistLocalBackup();
  render();
}
function initFirebaseSync(){
  if(!firebaseConfigured()){
    console.warn('Firebase no configurado. La app funcionará solo con copia local.');
    return;
  }
  if(!(window.firebase && firebase.apps)){
    console.error('Firebase SDK no disponible.');
    return;
  }
  try{
    firebaseApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(FIREBASE_CONFIG);
    firestoreDb = firebase.firestore();
    firebaseDocRef = firestoreDb.collection(FIREBASE_COLLECTION).doc(FIREBASE_DOCUMENT_ID);
    firebaseReady = true;
    firebaseUnsubscribe = firebaseDocRef.onSnapshot(async snap => {
      if(!snap.exists){
        try{
          await firebaseDocRef.set({
            state: sanitizeStateForFirestore(state),
   
adminKey: "padel2026Admin!", 

            meta: {
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
              season: state.config?.season || '',
              title: state.config?.title || ''
            }
          }, {merge:true});
          remoteStateLoaded = true;
        }catch(err){
          console.error('No se pudo crear el documento inicial en Firebase:', err);
          toast('Firebase está configurado, pero el documento no se pudo crear', 'err');
        }
        return;
      }
      const data = snap.data() || {};
      if(data.state && !suppressRemoteEcho){
        applyRemoteState(data.state);
      }
      remoteStateLoaded = true;
    }, err => {
      console.error('Error escuchando Firebase:', err);
      toast('Error de sincronización con Firebase', 'err');
    });
  }catch(err){
    console.error('Error inicializando Firebase:', err);
    toast('Firebase no se ha podido iniciar. Revisa la configuración.', 'err');
  }
}

function getPairWarnings(pair){ return Math.max(0, Number(pair?.warnings || 0) || 0); }

function canPairPlay(league, pairId){

function validateActivePair(pair){
  if(!pair) return { ok:false, message:'La pareja seleccionada no existe.' };
  if(isPairExpelled(pair)) return { ok:false, message:'No se puede gestionar un nuevo partido con una pareja expulsada por acumulación de 3 warnings.' };
  return { ok:true };
}

function compareHeadToHead(league, groupId, pairAId, pairBId){
  let pointsA = 0, pointsB = 0, diffA = 0, diffB = 0;
  const directMatches = league.matches.filter(m =>
    m.groupId === groupId &&
    m.played &&
    (
      (m.pairAId === pairAId && m.pairBId === pairBId) ||
      (m.pairAId === pairBId && m.pairBId === pairAId)
    )
  );

  directMatches.forEach(m => {
    const aIsHome = m.pairAId === pairAId;
    const scoreA = aIsHome ? Number(m.scoreA) : Number(m.scoreB);
    const scoreB = aIsHome ? Number(m.scoreB) : Number(m.scoreA);
    diffA += scoreA - scoreB;
    diffB += scoreB - scoreA;

    if(scoreA > scoreB) pointsA += 3;
    else if(scoreA < scoreB) pointsB += 3;
    else { pointsA += 1; pointsB += 1; }
  });

  if(pointsA !== pointsB) return pointsB - pointsA;
  if(diffA !== diffB) return diffB - diffA;
  return 0;
}

function computeStandings(leagueId){
  const league = getLeague(leagueId);
  return league.groups.map(group => {
    const rows = group.pairIds.map(pairId => {
      const pair = league.pairs.find(p => p.id === pairId);
      let points = 0, played = 0, scheduled = 0, pending = 0, postponed = 0, won = 0, drawn = 0, lost = 0, gf = 0, ga = 0;
      league.matches
        .filter(m => m.groupId === group.id && (m.pairAId === pairId || m.pairBId === pairId))
        .forEach(m => {
          if(m.scheduledDate || m.scheduledWeek){
            scheduled++;
            if(!m.played) pending++;
          }
          if(m.postponed) postponed++;
          if(m.played){
            const isA = m.pairAId === pairId;
            const my = isA ? Number(m.scoreA) : Number(m.scoreB);
            const opp = isA ? Number(m.scoreB) : Number(m.scoreA);
            played++; gf += my; ga += opp;
            if(my > opp){ points += 3; won++; }
            else if(my === opp){ points += 1; drawn++; }
            else { lost++; }
          }
        });
      const warnings = getPairWarnings(pair);
      const expelled = isPairExpelled(pair);
      return { pairId, pair, points, played, scheduled, pending, postponed, won, drawn, lost, gf, ga, diff: gf-ga, warnings, warningNote: getPairWarningNote(pair), expelled };
    }).sort((a,b)=>
      Number(a.expelled) - Number(b.expelled) ||
      b.points-a.points ||
      b.diff-a.diff ||
      compareHeadToHead(league, group.id, a.pairId, b.pairId) ||
      b.gf-a.gf ||
      a.pair.j1.localeCompare(b.pair.j1)
    );
    return { group, rows };
  });
}

function getAllRoundRobinPairs(pairIds){
  const out = [];
  for(let i=0;i<pairIds.length;i++){
    for(let j=i+1;j<pairIds.length;j++){
      out.push([pairIds[i], pairIds[j]]);
    }
  }
  return out;
}
function pairComboKey(a,b){ return [a,b].sort().join('|'); }

function existingLegCombos(league, leg, excludeMatchId=''){
  const set = new Set();
  league.matches
    .filter(m => Number(m.leg) === Number(leg) && (!excludeMatchId || m.id !== excludeMatchId))
    .forEach(m => {
      set.add(pairComboKey(m.pairAId, m.pairBId));
    });
  return set;
}

function hasDuplicateMatchInLeg(league, pairAId, pairBId, leg, excludeMatchId=''){
  const combos = existingLegCombos(league, leg, excludeMatchId);
  return combos.has(pairComboKey(pairAId, pairBId));
}

function getPairGroupId(league, pairId){
  return league.pairs.find(p => p.id === pairId)?.groupId || '';
}

function validateSameGroupMatch(league, pairAId, pairBId, selectedGroupId=''){
  const groupAId = getPairGroupId(league, pairAId);
  const groupBId = getPairGroupId(league, pairBId);
  if(!groupAId || !groupBId || groupAId !== groupBId){
    return { ok:false, message:'No se puede crear ese partido: las parejas pertenecen a grupos distintos o no tienen grupo asignado. Solo se permiten partidos entre parejas del mismo grupo.' };
  }
  if(selectedGroupId && selectedGroupId !== groupAId){
    return { ok:false, message:'No se puede crear ese partido: el grupo seleccionado no coincide con el grupo real de ambas parejas.' };
  }
  return { ok:true, groupId:groupAId };
}

function allFirstLegCompleted(league){
  const expected = league.groups.reduce((acc,g)=> acc + ((g.pairIds.length*(g.pairIds.length-1))/2), 0);
  const leg1 = league.matches.filter(m => Number(m.leg)===1);
  return expected > 0 && leg1.length >= expected && leg1.every(m => m.played);
}

function generateMissingMatchesForLeg(league, leg){
  const existing = existingLegCombos(league, leg);
  const newMatches = [];
  league.groups.forEach(group => {
    const combos = getAllRoundRobinPairs(group.pairIds);
    combos.forEach(([a,b]) => {
      const key = pairComboKey(a,b);
      if(existing.has(key)) return;
      newMatches.push({
        id: uid('match'),
        groupId: group.id,
        pairAId: leg === 1 ? a : b,
        pairBId: leg === 1 ? b : a,
        leg,
        scheduledDate: '',
        scheduledWeek: '',
        played: false,
        scoreA: '',
        scoreB: '',
        manual: false,
        notes: '',
        postponed: false
      });
      existing.add(key);
    });
  });
  league.matches.push(...newMatches);
  return newMatches;
}

function mondayOf(dateStr){
  const date = new Date(dateStr + 'T12:00:00');
  const day = date.getDay(); // 0 Sunday
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate()+diff);
  return date;
}
function formatDateInput(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const da=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function formatDateEs(dateStr){
  if(!dateStr) return 'Sin fecha';
  const d = new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'2-digit'});
}
function isoWeekLabelFromMonday(d){
  const copy = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  copy.setUTCDate(copy.getUTCDate() + 4 - (copy.getUTCDay()||7));
  const yearStart = new Date(Date.UTC(copy.getUTCFullYear(),0,1));
  const week = Math.ceil((((copy - yearStart)/86400000)+1)/7);
  return `${copy.getUTCFullYear()}-W${String(week).padStart(2,'0')}`;
}

function getScheduleDates(anchorStr, allowedDays, mode){
  const order = ['Lunes','Martes','Miércoles','Jueves','Viernes'];
  const selected = order.filter(day => allowedDays.includes(day));
  if(mode === 'month'){
    const anchor = new Date(anchorStr + 'T12:00:00');
    const month = anchor.getMonth();
    const dates = [];
    const d = new Date(anchor.getFullYear(), anchor.getMonth(), anchor.getDate(), 12, 0, 0);
    while(d.getMonth() === month){
      const jsDay = d.getDay();
      const idx = jsDay === 0 ? -1 : jsDay - 1;
      const dayName = order[idx];
      if(dayName && selected.includes(dayName)) dates.push({date: formatDateInput(d), dayName});
      d.setDate(d.getDate()+1);
    }
    return dates;
  }
  const monday = mondayOf(anchorStr);
  return selected.map(dayName => {
    const offset = order.indexOf(dayName);
    const d = new Date(monday);
    d.setDate(monday.getDate()+offset);
    return {date: formatDateInput(d), dayName};
  });
}

function schedulePeriodForLeague(leagueId, anchorStr, allowedDays, leg, maxPerDay, mode='week'){
  const league = getLeague(leagueId);
  if(Number(leg) === 2 && !allFirstLegCompleted(league)){
    throw new Error('La segunda vuelta solo puede generarse cuando toda la primera vuelta esté jugada.');
  }
  generateMissingMatchesForLeg(league, leg);

  const blockedCombos = new Set();
  league.matches.forEach(m => {
    if(Number(m.leg) !== Number(leg)) return;
    if(m.played || m.scheduledDate){
      blockedCombos.add(pairComboKey(m.pairAId, m.pairBId));
    }
  });

  const seenPoolCombos = new Set();
  const pool = league.matches.filter(m => {
    if(Number(m.leg)!==Number(leg)) return false;
    if(m.played || m.scheduledDate) return false;
    if(!canPairPlay(league, m.pairAId) || !canPairPlay(league, m.pairBId)) return false;
    const combo = pairComboKey(m.pairAId, m.pairBId);
    if(blockedCombos.has(combo)) return false;
    if(seenPoolCombos.has(combo)) return false;
    seenPoolCombos.add(combo);
    return true;
  });
  if(pool.length === 0) return {assigned:0, skippedDates:[]};

  const dates = getScheduleDates(anchorStr, allowedDays, mode);
  const existingByDate = {};
  league.matches.forEach(m => {
    if(!m.scheduledDate) return;
    existingByDate[m.scheduledDate] = (existingByDate[m.scheduledDate] || 0) + 1;
  });

  const skippedDates = dates.filter(d => (existingByDate[d.date] || 0) > 0).map(d => d.date);
  const usableDates = dates.filter(d => !skippedDates.includes(d.date));
  if(!usableDates.length) return {assigned:0, skippedDates};

  const byGroup = {};
  pool.forEach(m => {
    byGroup[m.groupId] = byGroup[m.groupId] || [];
    byGroup[m.groupId].push(m);
  });
  Object.values(byGroup).forEach(arr => arr.sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||'') || a.id.localeCompare(b.id)));

  const historicalCounts = {};
  const pairLegCounts = {};
  const pairWeekCounts = {};
  const pairRecentDate = {};
  league.groups.forEach(g => historicalCounts[g.id] = 0);
  league.pairs.forEach(p => {
    pairLegCounts[p.id] = 0;
    pairRecentDate[p.id] = '';
  });
  league.matches.forEach(m => {
    if(Number(m.leg)!==Number(leg)) return;
    if(m.groupId){
      historicalCounts[m.groupId] = (historicalCounts[m.groupId] || 0) + ((m.played || m.scheduledDate) ? 1 : 0);
    }
    if(m.played || m.scheduledDate){
      pairLegCounts[m.pairAId] = (pairLegCounts[m.pairAId] || 0) + 1;
      pairLegCounts[m.pairBId] = (pairLegCounts[m.pairBId] || 0) + 1;
      const week = m.scheduledWeek || (m.scheduledDate ? isoWeekLabelFromMonday(mondayOf(m.scheduledDate)) : '');
      if(week){
        pairWeekCounts[week] = pairWeekCounts[week] || {};
        pairWeekCounts[week][m.pairAId] = (pairWeekCounts[week][m.pairAId] || 0) + 1;
        pairWeekCounts[week][m.pairBId] = (pairWeekCounts[week][m.pairBId] || 0) + 1;
      }
      if(m.scheduledDate){
        if(!pairRecentDate[m.pairAId] || m.scheduledDate > pairRecentDate[m.pairAId]) pairRecentDate[m.pairAId] = m.scheduledDate;
        if(!pairRecentDate[m.pairBId] || m.scheduledDate > pairRecentDate[m.pairBId]) pairRecentDate[m.pairBId] = m.scheduledDate;
      }
    }
  });
  const assignedCounts = {};
  league.groups.forEach(g => assignedCounts[g.id] = 0);

  const assignedIds = new Set();
  let assigned = 0;

  usableDates.forEach(({date, dayName}) => {
    const pairBooked = new Set();
    const groupsUsedToday = new Set();
    const weekLabel = isoWeekLabelFromMonday(mondayOf(date));
    pairWeekCounts[weekLabel] = pairWeekCounts[weekLabel] || {};

    function matchPriority(m){
      const weekA = pairWeekCounts[weekLabel][m.pairAId] || 0;
      const weekB = pairWeekCounts[weekLabel][m.pairBId] || 0;
      const totalA = pairLegCounts[m.pairAId] || 0;
      const totalB = pairLegCounts[m.pairBId] || 0;
      const recentA = pairRecentDate[m.pairAId] || '';
      const recentB = pairRecentDate[m.pairBId] || '';
      const maxWeek = Math.max(weekA, weekB);
      const sumWeek = weekA + weekB;
      const maxTotal = Math.max(totalA, totalB);
      const sumTotal = totalA + totalB;
      const recency = Math.max(recentA || '', recentB || '');
      return [maxWeek, sumWeek, maxTotal, sumTotal, recency, m.id];
    }

    function chooseMatch(avoidRepeatGroup){
      const groupIds = Object.keys(byGroup).filter(gid => byGroup[gid].some(m => !assignedIds.has(m.id)));
      groupIds.sort((a,b) => {
        const cmp1 = (assignedCounts[a]||0) - (assignedCounts[b]||0);
        if(cmp1) return cmp1;
        const cmp2 = (historicalCounts[a]||0) - (historicalCounts[b]||0);
        if(cmp2) return cmp2;
        const ia = league.groups.findIndex(g=>g.id===a);
        const ib = league.groups.findIndex(g=>g.id===b);
        return ia - ib;
      });

      let best = null;
      let bestScore = null;
      for(const gid of groupIds){
        if(avoidRepeatGroup && groupsUsedToday.has(gid)) continue;
        const candidates = byGroup[gid].filter(m => {
          if(assignedIds.has(m.id)) return false;
          const pairA = league.pairs.find(p=>p.id===m.pairAId);
          const pairB = league.pairs.find(p=>p.id===m.pairBId);
          const unavailable = new Set([...(pairA?.unavailable||[]), ...(pairB?.unavailable||[])]);
          return !unavailable.has(dayName) && !pairBooked.has(m.pairAId) && !pairBooked.has(m.pairBId);
        });
        if(!candidates.length) continue;
        candidates.sort((m1,m2) => {
          const p1 = matchPriority(m1);
          const p2 = matchPriority(m2);
          for(let i=0;i<p1.length;i++){
            if(p1[i] < p2[i]) return -1;
            if(p1[i] > p2[i]) return 1;
          }
          return 0;
        });
        const candidate = candidates[0];
        const score = matchPriority(candidate);
        if(!best){
          best = candidate;
          bestScore = score;
          continue;
        }
        for(let i=0;i<score.length;i++){
          if(score[i] < bestScore[i]){
            best = candidate;
            bestScore = score;
            break;
          }
          if(score[i] > bestScore[i]) break;
        }
      }
      return best;
    }

    for(let slot=0; slot<maxPerDay; slot++){
      let match = chooseMatch(true);
      if(!match) match = chooseMatch(false);
      if(!match) break;
      match.scheduledDate = date;
      match.scheduledWeek = weekLabel;
      assignedIds.add(match.id);
      pairBooked.add(match.pairAId);
      pairBooked.add(match.pairBId);
      groupsUsedToday.add(match.groupId);
      assignedCounts[match.groupId] = (assignedCounts[match.groupId] || 0) + 1;
      pairLegCounts[match.pairAId] = (pairLegCounts[match.pairAId] || 0) + 1;
      pairLegCounts[match.pairBId] = (pairLegCounts[match.pairBId] || 0) + 1;
      pairWeekCounts[weekLabel][match.pairAId] = (pairWeekCounts[weekLabel][match.pairAId] || 0) + 1;
      pairWeekCounts[weekLabel][match.pairBId] = (pairWeekCounts[weekLabel][match.pairBId] || 0) + 1;
      pairRecentDate[match.pairAId] = date;
      pairRecentDate[match.pairBId] = date;
      assigned++;
    }
  });

  return {assigned, skippedDates};
}


function makeBackupFileName(ext){
  const season = (state.config.season || 'temporada').replace(/[^\w\-]+/g,'_');
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const stamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
  return `liga_padel_escolar_${season}_${stamp}.${ext}`;
}
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}
function parseBool(value){
  if(typeof value === 'boolean') return value;
  const v = String(value || '').trim().toLowerCase();
  return ['si','sí','true','1','yes','x'].includes(v);
}
function normalizeImportedState(imported){
  validateImportedState(imported);
  const merged = deepClone(DEFAULT_STATE);
  merged.config = Object.assign({}, merged.config, imported.config || {});
  merged.ui = Object.assign({}, merged.ui, imported.ui || {});
  merged.resources = Array.isArray(imported.resources) ? imported.resources.map(resource => ({
    id: resource.id || uid('res'),
    title: String(resource.title || ''),
    url: String(resource.url || ''),
    description: String(resource.description || ''),
    type: String(resource.type || 'Enlace')
  })) : [];
  merged.leagues = Array.isArray(imported.leagues) ? imported.leagues.map((league, idx) => {
    const base = deepClone(DEFAULT_STATE.leagues[idx] || {
      id: uid('league'),
      name: 'Liga',
      subtitle: '',
      accent: idx === 0 ? 'future' : 'pro',
      pairs: [],
      groups: [],
      matches: [],
      playoffMatches: []
    });
    const normalized = Object.assign(base, league || {});
    normalized.pairs = Array.isArray(normalized.pairs) ? normalized.pairs.map(pair => ({
      id: pair.id || uid('pair'),
      j1: pair.j1 || '',
      j2: pair.j2 || '',
      reserve: pair.reserve || '',
      course1: pair.course1 || '',
      course2: pair.course2 || '',
      level1: pair.level1 || '',
      level2: pair.level2 || '',
      paid: !!pair.paid,
      unavailable: Array.isArray(pair.unavailable) ? pair.unavailable : String(pair.unavailable || '').split('|').filter(Boolean),
      groupId: pair.groupId || null,
      warnings: Math.max(0, Number(pair.warnings || 0) || 0),
      warningNote: pair.warningNote || ''
    })) : [];
    normalized.groups = Array.isArray(normalized.groups) ? normalized.groups.map(group => ({
      id: group.id || uid('group'),
      name: group.name || '',
      pairIds: Array.isArray(group.pairIds) ? group.pairIds.filter(Boolean) : String(group.pairIds || '').split('|').filter(Boolean)
    })) : [];
    normalized.matches = Array.isArray(normalized.matches) ? normalized.matches.map(match => ({
      id: match.id || uid('match'),
      groupId: match.groupId || null,
      leg: Number(match.leg || 1),
      pairAId: match.pairAId || null,
      pairBId: match.pairBId || null,
      scheduledDate: match.scheduledDate || '',
      scheduledWeek: match.scheduledWeek || '',
      played: !!match.played,
      scoreA: match.scoreA === '' || match.scoreA === null || match.scoreA === undefined ? null : Number(match.scoreA),
      scoreB: match.scoreB === '' || match.scoreB === null || match.scoreB === undefined ? null : Number(match.scoreB),
      manual: !!match.manual,
      notes: match.notes || '',
      postponed: !!match.postponed
    })) : [];
    normalized.playoffMatches = Array.isArray(normalized.playoffMatches) ? normalized.playoffMatches : [];
    return normalized;
  }) : deepClone(DEFAULT_STATE.leagues);
  return merged;
}

async function syncStateToFirebaseNow(){
  if(!firebaseReady || !firebaseDocRef) return;
  suppressRemoteEcho = true;
  try{
    await firebaseDocRef.set({
      state: sanitizeStateForFirestore(state),
      adminKey: "padel2026Admin!",
      meta: {
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        season: state.config?.season || '',
        title: state.config?.title || ''
      }
    }, {merge:true});
  }finally{
    setTimeout(()=>{ suppressRemoteEcho = false; }, 1500);
  }
}
function importJSONFile(file){
  const reader = new FileReader();
  reader.onload = async e => {
    try{
      const imported = JSON.parse(e.target.result);
      const sourceState = imported && imported.state ? imported.state : imported;
      const normalized = normalizeImportedState(sourceState);
      const transientUi = {
        tab: state.ui.tab,
        adminTab: state.ui.adminTab,
        selectedLeagueId: state.ui.selectedLeagueId,
        showPostponedList: state.ui.showPostponedList,
        calendarSearch: state.ui.calendarSearch,
        adminMatchesSearch: state.ui.adminMatchesSearch
      };
      normalized.ui = {...normalized.ui, ...transientUi};
      state = normalized;
      isAdmin = false;
      persistLocalBackup();
      render();
      await syncStateToFirebaseNow();
      toast('Datos JSON importados correctamente');
    }catch(err){
      console.error('Error al importar JSON:', err);
      toast('Error al importar JSON: '+err.message, 'err');
    }
  };
  reader.readAsText(file);
}

function validateImportedState(obj){
  if(!obj || typeof obj !== 'object') throw new Error('Formato inválido.');
  if(!obj.config || !Array.isArray(obj.leagues)) throw new Error('Faltan bloques básicos del backup.');
  obj.leagues.forEach((l, idx)=>{
    if(!l || typeof l !== 'object') throw new Error(`Liga ${idx+1} inválida.`);
    if(!Array.isArray(l.pairs) || !Array.isArray(l.groups) || !Array.isArray(l.matches)) throw new Error(`La liga "${l.name || idx+1}" tiene una estructura inválida.`);
  });
}

function renderPublicMatches(league){
  const items = [...league.matches]
    .filter(m=>m.scheduledDate || m.played)
    .sort((a,b)=>(a.scheduledDate||'9999').localeCompare(b.scheduledDate||'9999'))
    .slice(0,10);

  if(!items.length) return `<div class="empty">Todavía no hay partidos programados.</div>`;
  return items.map(m=>{
    const a = league.pairs.find(p=>p.id===m.pairAId);
    const b = league.pairs.find(p=>p.id===m.pairBId);
    const g = league.groups.find(x=>x.id===m.groupId);
    return `<div class="match-item">
      <span class="badge violet">${g?.name || 'Sin grupo'}</span>
      <div class="match-pair-block"><div class="pair-name">${a?.j1 || '?'} / ${a?.j2 || '?'}</div></div>
      <span class="match-vs">VS</span>
      <div class="match-pair-block"><div class="pair-sub">${b?.j1 || '?'} / ${b?.j2 || '?'}</div></div>
      <span class="badge blue">${m.scheduledDate ? formatDateEs(m.scheduledDate) : 'Sin fecha'}</span>
      ${m.played ? `<div class="score">${m.scoreA}–${m.scoreB}</div>` : `<span class="badge">Pendiente</span>`}
      ${m.postponed ? `<span class="badge gold">Aplazado</span>` : ``}
      <span class="badge ${Number(m.leg)===1?'gold':'blue'}">${Number(m.leg)===1?'1ª vuelta':'2ª vuelta'}</span>
      ${m.notes ? `<div class="match-note"><strong>Observación:</strong> ${escapeHtml(m.notes)}</div>` : ``}
    </div>`;
  }).join('');
}

function clearCalendarSearch(){
  state.ui.calendarSearch = '';

}
function matchCalendarSearch(league, match, searchValue){
  const term = String(searchValue || '').trim().toLowerCase();
  if(!term) return true;
  const pairA = league.pairs.find(p=>p.id===match.pairAId);
  const pairB = league.pairs.find(p=>p.id===match.pairBId);
  const haystack = [
    pairA?.j1 || '', pairA?.j2 || '',
    pairB?.j1 || '', pairB?.j2 || '',
    `${pairA?.j1 || ''} ${pairA?.j2 || ''}`,
    `${pairB?.j1 || ''} ${pairB?.j2 || ''}`,
    `${pairA?.j1 || ''} / ${pairA?.j2 || ''}`,
    `${pairB?.j1 || ''} / ${pairB?.j2 || ''}`
  ].join(' ').toLowerCase();
  return haystack.includes(term);
}
function renderCalendar(){
  const league = getLeague();
  const searchValue = String(state.ui.calendarSearch || '').trim();

  const filteredMatches = [...league.matches]
    .filter(m => matchCalendarSearch(league, m, searchValue))

    const key = m.scheduledWeek || 'Sin semana';

    grouped[key].push(m);

  const visibleGroupedEntries = Object.entries(grouped).filter(([week]) => isAdmin || !isCalendarWeekHiddenForSpectators(league.id, week));

            Desde aquí puedes ocultar o mostrar semanas concretas del calendario para espectadores. Como administrador seguirás viendo siempre todas las semanas.

function openAddResourceModal(resourceId=''){
  const resource = resourceId ? (state.resources || []).find(r => r.id === resourceId) : null;
  openModal(resource ? 'Editar contenido' : 'Añadir contenido', `
    <div class="form-grid">
      <div class="field c6"><label>Título</label><input id="res_title" value="${escapeHtml(resource?.title || '')}" placeholder="Ej. Cómo colocarse en pista"></div>
      <div class="field c3"><label>Tipo</label><select id="res_type">
        ${['Vídeo','Foto','Artículo','Enlace','Contenido de la liga'].map(t => `<option ${resource?.type===t?'selected':''}>${t}</option>`).join('')}
      </select></div>
      <div class="field c3"><label>Enlace</label><input id="res_url" value="${escapeHtml(resource?.url || '')}" placeholder="https://..."></div>
      <div class="field c12"><label>Descripción</label><textarea id="res_description">${escapeHtml(resource?.description || '')}</textarea></div>
      <div class="c12" style="display:flex;justify-content:flex-end;gap:10px">
        <button class="btn" onclick="closeModal()">Cancelar</button>
        <button class="btn primary" onclick="saveResource('${resourceId}')">Guardar</button>
      </div>
    </div>
  `);
}
function saveResource(resourceId=''){
  const title = document.getElementById('res_title').value.trim();
  const type = document.getElementById('res_type').value.trim();
  const url = document.getElementById('res_url').value.trim();
  const description = document.getElementById('res_description').value.trim();
  if(!title || !url){
    toast('Debes indicar al menos título y enlace', 'err');
    return;
  }
  const payload = { id: resourceId || uid('res'), title, type, url, description };
  const idx = state.resources.findIndex(r => r.id === payload.id);
  if(idx >= 0) state.resources[idx] = payload;
  else state.resources.unshift(payload);
  saveState();
  closeModal();
  render();
  toast('Contenido guardado');
}
function moveResource(resourceId, direction){
  const idx = state.resources.findIndex(r => r.id === resourceId);
  if(idx < 0) return;
  const newIdx = idx + Number(direction || 0);
  if(newIdx < 0 || newIdx >= state.resources.length) return;
  const item = state.resources[idx];
  state.resources.splice(idx, 1);
  state.resources.splice(newIdx, 0, item);
  saveState();
  render();
  toast('Orden de contenidos actualizado');
}

function deleteResource(resourceId){
  if(!confirm('¿Borrar este contenido?')) return;
  state.resources = state.resources.filter(r => r.id !== resourceId);
  saveState();
  render();
  toast('Contenido eliminado');
}

function renameGroup(groupId, name){
  const league = getLeague();
  const g = league.groups.find(x=>x.id===groupId);
  if(!g) return;
  g.name = name.trim() || 'Grupo';
  saveState(); render(); toast('Nombre de grupo actualizado');
}
function deleteGroup(groupId){
  const league = getLeague();
  if(!confirm('¿Eliminar este grupo? Las parejas quedarán sin grupo asignado.')) return;
  const g = league.groups.find(x=>x.id===groupId);
  if(!g) return;
  league.pairs.forEach(p => { if(p.groupId === groupId) p.groupId = ''; });
  league.matches = league.matches.filter(m => m.groupId !== groupId);
  league.groups = league.groups.filter(x=>x.id!==groupId);
  saveState(); render(); toast('Grupo eliminado');
}
function assignSelectedToGroup(groupId){
  const select = document.getElementById('assign_'+groupId);
  const pairId = select.value;
  if(!pairId) return;
  assignPairToGroup(pairId, groupId);
}
function assignPairToGroup(pairId, groupId){
  const league = getLeague();
  const pair = league.pairs.find(p=>p.id===pairId);
  const target = league.groups.find(g=>g.id===groupId);
  if(!pair || !target) return;
  if(target.pairIds.length >= 8){
    toast('Un grupo no puede tener más de 8 parejas','err');
    return;
  }
  league.groups.forEach(g => g.pairIds = g.pairIds.filter(id => id !== pairId));
  target.pairIds.push(pairId);
  pair.groupId = groupId;
  saveState(); render(); toast('Pareja asignada al grupo');
}
function removePairFromGroup(groupId, pairId){
  const league = getLeague();
  const g = league.groups.find(x=>x.id===groupId);
  const p = league.pairs.find(x=>x.id===pairId);
  if(!g || !p) return;
  g.pairIds = g.pairIds.filter(id=>id!==pairId);
  p.groupId = '';
  saveState(); render(); toast('Pareja quitada del grupo');
}
function autoCreateGroups(){
  const league = getLeague();
  const size = Number(document.getElementById('autoGroupSize').value);
  if(!league.pairs.length){
    toast('No hay parejas inscritas','err');
    return;
  }
  if(!confirm('Se regenerarán los grupos y se eliminarán los partidos existentes de grupos.')) return;
  league.groups = [];
  league.matches = league.matches.filter(m => m.manual); // preserve manual if desired
  league.pairs.forEach(p => p.groupId = '');
  const ids = league.pairs.map(p=>p.id);
  for(let i=0;i<ids.length;i+=size){
    const chunk = ids.slice(i,i+size);
    const g = { id: uid('group'), name: `Grupo ${league.groups.length+1}`, pairIds: [] };
    league.groups.push(g);
    chunk.forEach(pid => {
      if(g.pairIds.length < 8){
        g.pairIds.push(pid);
        const p = league.pairs.find(x=>x.id===pid);
        if(p) p.groupId = g.id;
      }
    });
  }
  saveState(); render(); toast('Grupos generados automáticamente');
}

  }
}

function addPair(){
  const currentLeague = getLeague();
  const leagueId = document.getElementById('p_league').value || currentLeague.id;
  const league = state.leagues.find(l=>l.id===leagueId) || currentLeague;
  const j1 = document.getElementById('p_j1').value.trim();
  const j2 = document.getElementById('p_j2').value.trim();
  if(!j1 || !j2){ toast('Debes introducir ambos jugadores','err'); return; }
  let groupId = document.getElementById('p_group').value || '';
  if(league.id !== currentLeague.id) groupId = '';
  const pair = {
    id: uid('pair'),
    j1, j2,
    reserve: document.getElementById('p_reserve').value.trim(),
    course1: document.getElementById('p_c1').value,
    course2: document.getElementById('p_c2').value,
    level1: document.getElementById('p_l1').value,
    level2: document.getElementById('p_l2').value,
    paid: document.getElementById('p_paid').value === '1',
    warnings: Math.min(3, Math.max(0, Number(document.getElementById('p_warnings').value || 0) || 0)),
    warningNote: document.getElementById('p_warningNote').value.trim(),
    unavailable: [...document.querySelectorAll('input[name="p_unavailable"]:checked')].map(x=>x.value),
    groupId
  };
  league.pairs.push(pair);
  if(pair.groupId){
    const group = league.groups.find(g=>g.id===pair.groupId);
    if(group){
      if(group.pairIds.length >= 8){
        toast('Ese grupo ya tiene 8 parejas','err');
        league.pairs.pop();
        return;
      }
      group.pairIds.push(pair.id);
    }
  }
  saveState(); render(); toast(`Pareja inscrita en ${league.name}${isPairExpelled(pair)?' · marcada como expulsada por 3 warnings':''}`);
}
function changePairGroup(pairId, newGroupId){
  const league = getLeague();
  const pair = league.pairs.find(p=>p.id===pairId);
  if(!pair) return;
  const target = newGroupId ? league.groups.find(g=>g.id===newGroupId) : null;
  if(target && target.pairIds.length >= 8 && pair.groupId !== newGroupId){
    toast('Ese grupo ya tiene 8 parejas','err');
    render();
    return;
  }
  league.groups.forEach(g => g.pairIds = g.pairIds.filter(id => id !== pairId));
  pair.groupId = newGroupId || '';
  if(target) target.pairIds.push(pairId);
  saveState(); render(); toast('Grupo actualizado');
}

function refreshEditPairGroups(pairId){
  const selectedLeagueId = document.getElementById('e_league').value;
  const league = state.leagues.find(l=>l.id===selectedLeagueId);
  const pair = state.leagues.flatMap(l=>l.pairs).find(x=>x.id===pairId);
  const select = document.getElementById('e_group');
  const note = document.getElementById('e_group_note');
  if(!select || !league) return;
  const currentGroupId = pair && pair.groupId && league.groups.some(g=>g.id===pair.groupId) ? pair.groupId : '';
  select.innerHTML = `<option value="">Sin grupo</option>${league.groups.map(g=>`<option value="${g.id}" ${currentGroupId===g.id?'selected':''}>${g.name}</option>`).join('')}`;
  select.disabled = league.groups.length===0;
  if(note){
    note.innerHTML = league.groups.length===0
      ? `<span style="color:var(--red)">⚠ Esta liga todavía no tiene grupos creados.</span>`
      : `<span style="color:var(--muted)">${league.groups.length} grupo(s) disponible(s).</span>`;
  }
}
function saveEditedPair(pairId){
  const oldLeague = state.leagues.find(l => l.pairs.some(x=>x.id===pairId));
  const targetLeague = state.leagues.find(l => l.id === document.getElementById('e_league').value) || oldLeague;
  const p = oldLeague ? oldLeague.pairs.find(x=>x.id===pairId) : null;
  if(!p) return;
  p.j1 = document.getElementById('e_j1').value.trim();
  p.j2 = document.getElementById('e_j2').value.trim();
  p.course1 = document.getElementById('e_c1').value;
  p.course2 = document.getElementById('e_c2').value;
  p.reserve = document.getElementById('e_reserve').value.trim();
  p.level1 = document.getElementById('e_l1').value;
  p.level2 = document.getElementById('e_l2').value;
  p.paid = document.getElementById('e_paid').value === '1';
  p.warnings = Math.min(3, Math.max(0, Number(document.getElementById('e_warnings').value || 0) || 0));
  p.warningNote = document.getElementById('e_warningNote').value.trim();
  p.unavailable = [...document.querySelectorAll('input[name="e_unavailable"]:checked')].map(x=>x.value);
  const newGroup = document.getElementById('e_group').value || '';
  if(oldLeague && targetLeague && oldLeague.id !== targetLeague.id){
    oldLeague.groups.forEach(g=>g.pairIds=g.pairIds.filter(id=>id!==pairId));
    oldLeague.matches = oldLeague.matches.filter(m=>m.pairAId!==pairId && m.pairBId!==pairId);
    oldLeague.pairs = oldLeague.pairs.filter(x=>x.id!==pairId);
    p.groupId = '';
    targetLeague.pairs.push(p);
  }
  changePairGroupNoRender(pairId, newGroup, targetLeague.id);
  saveState(); closeModal(); render(); toast('Pareja actualizada');
}
function changePairGroupNoRender(pairId, groupId, leagueId){
  const league = state.leagues.find(l=>l.id===leagueId) || getLeague();
  const pair = league.pairs.find(p=>p.id===pairId);
  if(!pair) return;
  league.groups.forEach(g=>g.pairIds=g.pairIds.filter(id=>id!==pairId));
  pair.groupId = groupId;
  if(groupId){
    const g = league.groups.find(x=>x.id===groupId);
    if(g && g.pairIds.length < 8 && !g.pairIds.includes(pairId)) g.pairIds.push(pairId);
    else if(g && g.pairIds.length >= 8 && !g.pairIds.includes(pairId)) pair.groupId = '';
  }
}

function matchAdminMatchesSearch(league, match, searchValue){
  const term = String(searchValue || '').trim().toLowerCase();
  if(!term) return true;
  const pairA = league.pairs.find(p=>p.id===match.pairAId);
  const pairB = league.pairs.find(p=>p.id===match.pairBId);
  const group = league.groups.find(g=>g.id===match.groupId);
  const haystack = [
    pairA?.j1 || '', pairA?.j2 || '',
    pairB?.j1 || '', pairB?.j2 || '',
    `${pairA?.j1 || ''} ${pairA?.j2 || ''}`,
    `${pairB?.j1 || ''} ${pairB?.j2 || ''}`,
    `${pairA?.j1 || ''} / ${pairA?.j2 || ''}`,
    `${pairB?.j1 || ''} / ${pairB?.j2 || ''}`,
    group?.name || '',
    match.scheduledDate || '',
    match.scheduledWeek || ''
  ].join(' ').toLowerCase();
  return haystack.includes(term);
}
function getHiddenCalendarWeeksForLeague(leagueId){
  const map = state.ui.hiddenCalendarWeeks || {};

function isCalendarWeekHiddenForSpectators(leagueId, weekLabel){

function toggleCalendarWeekVisibility(leagueId, weekLabel){
  const key = String(weekLabel || 'Sin semana');
  state.ui.hiddenCalendarWeeks = state.ui.hiddenCalendarWeeks || {};

}

function saveManualMatch(matchId=''){
  const league = getLeague();
  const existingMatch = matchId ? league.matches.find(m=>m.id===matchId) : null;
  const pairAId = document.getElementById('m_a').value;
  const pairBId = document.getElementById('m_b').value;
  if(!pairAId || !pairBId || pairAId === pairBId){
    toast('Debes elegir dos parejas distintas','err');
    return;
  }
  const leg = Number(document.getElementById('m_leg').value);
  const pairA = league.pairs.find(p=>p.id===pairAId);
  const pairB = league.pairs.find(p=>p.id===pairBId);
  const validA = validateActivePair(pairA);
  const validB = validateActivePair(pairB);
  if(!validA.ok) return toast(validA.message, 'err');
  if(!validB.ok) return toast(validB.message, 'err');

  const matchupChanged = !existingMatch || existingMatch.pairAId !== pairAId || existingMatch.pairBId !== pairBId || Number(existingMatch.leg) !== leg;
  if(matchupChanged && hasDuplicateMatchInLeg(league, pairAId, pairBId, leg, matchId)){
    toast(`No se puede crear ese partido: esas parejas ya tienen un enfrentamiento registrado en la ${leg}ª vuelta. Solo podrán volver a enfrentarse en la siguiente vuelta.`, 'err');
    return;
  }
  const selectedGroupId = document.getElementById('m_group').value || '';
  const sameGroupCheck = validateSameGroupMatch(league, pairAId, pairBId, selectedGroupId);
  if(!sameGroupCheck.ok){
    toast(sameGroupCheck.message, 'err');
    return;
  }
  const scoreA = document.getElementById('m_sa').value;
  const scoreB = document.getElementById('m_sb').value;
  const payload = {
    id: matchId || uid('match'),
    groupId: sameGroupCheck.groupId,
    pairAId,
    pairBId,
    leg,
    scheduledDate: document.getElementById('m_date').value || '',
    scheduledWeek: document.getElementById('m_date').value ? isoWeekLabelFromMonday(mondayOf(document.getElementById('m_date').value)) : '',
    played: scoreA !== '' && scoreB !== '',
    scoreA: scoreA === '' ? '' : Number(scoreA),
    scoreB: scoreB === '' ? '' : Number(scoreB),
    manual: true,
    notes: document.getElementById('m_notes').value.trim(),
    postponed: document.getElementById('m_postponed').checked
  };
  if(matchId){
    const idx = league.matches.findIndex(m=>m.id===matchId);
    if(idx>=0) league.matches[idx] = payload;
  }else{
    league.matches.push(payload);
  }
  saveState(); closeModal(); render(); toast('Partido guardado');
}

function saveMatchResult(matchId){
  const league = getLeague();
  const match = league.matches.find(m=>m.id===matchId);
  if(!match) return;
  const scoreAValue = document.getElementById('r_a').value.trim();
  const scoreBValue = document.getElementById('r_b').value.trim();
  const hasScoreA = scoreAValue !== '';
  const hasScoreB = scoreBValue !== '';

  if((hasScoreA && !hasScoreB) || (!hasScoreA && hasScoreB)){
    toast('Si introduces resultado, debes completar ambos marcadores','err');
    return;
  }

  if(hasScoreA && hasScoreB){
    match.scoreA = Number(scoreAValue);
    match.scoreB = Number(scoreBValue);
    match.played = true;
  }else{
    match.scoreA = '';
    match.scoreB = '';
    match.played = false;

  match.scheduledDate = document.getElementById('r_date').value || match.scheduledDate || '';
  match.notes = document.getElementById('r_notes').value.trim();
  match.postponed = document.getElementById('r_postponed').checked;

    match.scheduledWeek = isoWeekLabelFromMonday(mondayOf(match.scheduledDate));

  saveState();
  closeModal();
  render();
  toast(hasScoreA && hasScoreB ? 'Resultado guardado' : 'Partido actualizado');

function deleteAllScheduledMatches(fromModal=false){
  const league = getLeague();
  const scheduled = league.matches.filter(m=>m.scheduledDate || m.scheduledWeek);
  if(!scheduled.length){
    toast('No hay partidos programados para borrar','err');
    return;
  }
  if(!confirm(`¿Borrar de una vez los ${scheduled.length} partidos programados? Los resultados ya jugados se mantendrán.`)) return;
  league.matches.forEach(m=>{
    if(!m.played){
      m.scheduledDate = '';
      m.scheduledWeek = '';
    }
  });
  saveState();
  if(fromModal) closeModal();
  render();
  toast('Partidos programados borrados');
}
function runScheduleGeneration(){
  const league = getLeague();
  const anchorStr = document.getElementById('sch_anchor').value;
  const mode = document.getElementById('sch_mode').value;
  const leg = Number(document.getElementById('sch_leg').value);
  const max = Number(document.getElementById('sch_max').value || 2);
  const days = [...document.querySelectorAll('input[name="sch_days"]:checked')].map(x=>x.value);
  if(!anchorStr || !days.length){
    toast('Debes elegir un periodo y al menos un día','err');
    return;
  }
  try{
    const res = schedulePeriodForLeague(league.id, anchorStr, days, leg, max, mode);
    saveState();
    closeModal();
    render();
    if(res.assigned && res.skippedDates.length){
      toast(`Programados ${res.assigned}. Omitidos ${res.skippedDates.length} días ya ocupados.`);
    }else if(res.assigned){
      toast(`Se han programado ${res.assigned} partidos`);
    }else if(res.skippedDates.length){
      toast('No se programó nada: los días elegidos ya tenían partidos asignados','err');
    }else{
      toast('No había partidos disponibles para programar');
    }
  }catch(err){
    toast(err.message, 'err');
  }
}


function getPlayoffCandidates(league){
  const standings = computeStandings(league.id);
  const firsts = [], seconds = [], thirds = [];
  standings.forEach(({group, rows})=>{
    const eligible = rows.filter(r => !r.expelled);
    if(eligible[0]) firsts.push({...eligible[0], groupName: group.name});
    if(eligible[1]) seconds.push({...eligible[1], groupName: group.name});
    if(eligible[2]) thirds.push({...eligible[2], groupName: group.name});
  });
  thirds.sort((a,b)=> b.points-a.points || b.diff-a.diff || b.gf-a.gf || a.pair.j1.localeCompare(b.pair.j1));
  const out = [...firsts, ...seconds];
  if(out.length < 8) out.push(...thirds.slice(0, 8-out.length));
  return out.slice(0,8);
}
function seedLabel(n){ return `S${n}`; }
function createPlayoffMatch(round,name,seedA,seedB,pairAId,pairBId){
  return { id: uid('po'), round, name, seedA, seedB, pairAId: pairAId||'', pairBId: pairBId||'', played:false, scoreA:'', scoreB:'', winnerId:'' };
}
function generatePlayoffs(){
  const league = getLeague();
  const candidates = getPlayoffCandidates(league);
  if(candidates.length < 8){ toast('Se necesitan 8 parejas clasificadas para generar el cuadro','err'); return; }
  if(!confirm('¿Generar el cuadro de playoffs? Si ya existe, se sustituirá.')) return;
  const s = candidates;
  league.playoffMatches = [
    createPlayoffMatch('qf','Cuartos 1',1,8,s[0].pairId,s[7].pairId),
    createPlayoffMatch('qf','Cuartos 2',4,5,s[3].pairId,s[4].pairId),
    createPlayoffMatch('qf','Cuartos 3',2,7,s[1].pairId,s[6].pairId),
    createPlayoffMatch('qf','Cuartos 4',3,6,s[2].pairId,s[5].pairId),
    createPlayoffMatch('sf','Semifinal 1',0,0,'',''),
    createPlayoffMatch('sf','Semifinal 2',0,0,'',''),
    createPlayoffMatch('f','Final',0,0,'','')
  ];
  saveState(); render(); toast('Cuadro de playoffs generado');
}
function updatePlayoffProgress(league){
  if(!Array.isArray(league.playoffMatches) || !league.playoffMatches.length) return;
  const qf = league.playoffMatches.filter(m=>m.round==='qf');
  const sf = league.playoffMatches.filter(m=>m.round==='sf');
  const f = league.playoffMatches.find(m=>m.round==='f');
  if(sf[0]){ sf[0].pairAId = qf[0]?.winnerId || ''; sf[0].pairBId = qf[1]?.winnerId || ''; if(!sf[0].pairAId || !sf[0].pairBId){ sf[0].played=false; sf[0].scoreA=''; sf[0].scoreB=''; sf[0].winnerId=''; } }
  if(sf[1]){ sf[1].pairAId = qf[2]?.winnerId || ''; sf[1].pairBId = qf[3]?.winnerId || ''; if(!sf[1].pairAId || !sf[1].pairBId){ sf[1].played=false; sf[1].scoreA=''; sf[1].scoreB=''; sf[1].winnerId=''; } }
  if(f){ f.pairAId = sf[0]?.winnerId || ''; f.pairBId = sf[1]?.winnerId || ''; if(!f.pairAId || !f.pairBId){ f.played=false; f.scoreA=''; f.scoreB=''; f.winnerId=''; } }
}
function clearPlayoffs(){
  const league = getLeague();
  if(!league.playoffMatches?.length){ toast('No hay playoffs generados','err'); return; }
  if(!confirm('¿Borrar todo el cuadro de playoffs?')) return;
  league.playoffMatches = [];
  saveState(); render(); toast('Playoffs borrados');
}
function setPlayoffResult(matchId){
  const league = getLeague();
  const m = league.playoffMatches.find(x=>x.id===matchId);
  if(!m) return;
  const a = league.pairs.find(p=>p.id===m.pairAId);
  const b = league.pairs.find(p=>p.id===m.pairBId);
  if(!a || !b){ toast('Ese partido aún no tiene dos parejas definidas','err'); return; }
  openModal(`Resultado · ${m.name}`, `
    <div class="form-grid"> 
      <div class="field c6"><label>${a.j1} / ${a.j2}</label><input type="number" id="po_scoreA" min="0" value="${m.scoreA!==''?m.scoreA:''}"></div>
      <div class="field c6"><label>${b.j1} / ${b.j2}</label><input type="number" id="po_scoreB" min="0" value="${m.scoreB!==''?m.scoreB:''}"></div>
      <div class="c12" style="display:flex;justify-content:flex-end;gap:10px"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="savePlayoffResult('${m.id}')">Guardar</button></div>
    </div>
  `);
}
function savePlayoffResult(matchId){
  const league = getLeague();
  const m = league.playoffMatches.find(x=>x.id===matchId);
  if(!m) return;
  const a = Number(document.getElementById('po_scoreA').value);
  const b = Number(document.getElementById('po_scoreB').value);
  if(Number.isNaN(a) || Number.isNaN(b)){ toast('Introduce ambos resultados','err'); return; }
  m.scoreA = a; m.scoreB = b; m.played = true; m.winnerId = a>=b ? m.pairAId : m.pairBId;
  updatePlayoffProgress(league);
  saveState(); closeModal(); render(); toast('Resultado del playoff guardado');
}
function getPlayoffChampion(league){
  const f = (league.playoffMatches||[]).find(m=>m.round==='f' && m.played && m.winnerId);
  return f ? league.pairs.find(p=>p.id===f.winnerId) : null;
}

        <p class="small-note">La web guarda los datos en Firebase en tiempo real. Aun así, puedes descargar una copia completa en JSON como respaldo y restauración de la web, incluyendo nombres de ligas, grupos, parejas, partidos, observaciones, aplazamientos, playoffs, imagen de normas y contenidos enlazados, y un Excel de consulta para visualizar lo más importante de forma clara.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
          <button class="btn primary" onclick="exportJSON()">Exportar JSON</button>
          <button class="btn good" onclick="exportExcel()">Exportar Excel</button>
        </div>
      </div>
      <div class="card" style="margin:0">
        <div class="card-title"><h3>Importar</h3></div>
        <p class="small-note">La importación sustituye los datos actuales. En esta versión, la restauración se hace solo mediante JSON, que conserva la estructura completa de ligas, grupos, parejas, partidos, observaciones, aplazamientos, playoffs, imagen de normas y contenidos enlazados.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
          <label class="btn">Importar JSON<input class="hidden" type="file" accept=".json" data-import-json></label>
          
        </div>
      </div>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="card-title"><h3>Resumen actual</h3></div>
      ${state.leagues.map(l=>`
        <div class="group-card" style="margin-bottom:12px">
          <strong>${l.name}</strong>
          <div class="chip-list" style="margin-top:10px">
            <span class="badge">${l.pairs.length} parejas</span>
            <span class="badge">${l.groups.length} grupos</span>
            <span class="badge">${l.matches.length} partidos</span>
            <span class="badge ok">${l.matches.filter(m=>m.played).length} jugados</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, s => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[s]));
}

render();
updateHeader();
initFirebaseSync();
</script>
</body>
</html>
